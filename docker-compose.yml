version: '3.9'

services:
  chroma:
    image: chromadb/chroma:latest
    container_name: deep_rag_chroma
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      # 建议使用绝对路径或确保 . 代表 backend 所在的父目录
      - ./data/chroma_db:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE # 建议关闭，解决你之前日志里的 telemetry 报错

  postgres:
    image: postgres:16-alpine
    container_name: deep_rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deep_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: